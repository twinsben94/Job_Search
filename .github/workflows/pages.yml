name: Deploy Career Job Tracker

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gh-pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Show Node version
        run: node --version

      - name: Refresh official job snapshot
        working-directory: 02_Web_App
        run: npm run fetch:jobs

      - name: Build static site
        working-directory: 02_Web_App
        run: npm run build:static

      - name: Publish to gh-pages branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -rf /tmp/job-search-pages
          mkdir -p /tmp/job-search-pages
          cp -R docs/. /tmp/job-search-pages/
          git switch --orphan gh-pages
          git rm -rf . || true
          cp -R /tmp/job-search-pages/. .
          touch .nojekyll
          git add .
          git commit -m "Deploy GitHub Pages" || echo "No changes to deploy"
          git push --force origin gh-pages
