name: Deploy Career Job Tracker

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gh-pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Show Node version
        run: node --version

      - name: Refresh official job snapshot
        working-directory: 02_Web_App
        run: npm run fetch:jobs

      - name: Build static site
        working-directory: 02_Web_App
        run: npm run build:static

      - name: Publish to gh-pages branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add 03_Github/02_pages_site
          git commit -m "Update static Pages build" || echo "No static changes"
          git subtree split --prefix 03_Github/02_pages_site -b gh-pages-deploy
          git push --force origin gh-pages-deploy:gh-pages
